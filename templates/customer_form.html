{% extends "base.html" %}
{% block title %}{{ 'Edit' if customer else 'New' }} Customer{% endblock %}
{% block page_title %}{{ 'Edit' if customer else 'New' }} Customer{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   value="{{ customer.name if customer else '' }}" required placeholder="Customer name"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mobile <span class="text-danger">*</span></label>
            <input type="text" name="mobile" class="form-control"
                   value="{{ customer.mobile if customer else '' }}" required placeholder="10-digit mobile"/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Address</label>
            <textarea name="address" class="form-control" rows="3"
                      placeholder="Optional address">{{ customer.address if customer else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-1"></i>{{ 'Update' if customer else 'Save' }} Customer
            </button>
            <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
