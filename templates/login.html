<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Shree Murari mudranaiaya</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
  <style>
    body { background:linear-gradient(135deg,#2c3e50,#3498db); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:16px; padding:40px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .login-card h2 { font-weight:700; color:#2c3e50; }
    .btn-login { background:#2c3e50; border:none; padding:10px; font-size:1rem; }
    .btn-login:hover { background:#3498db; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div style="font-size:2.5rem">🖨️</div>
    <h2>Shree Murari mudranaiaya Manager</h2>
    <p class="text-muted small">Admin Login</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
    </div>
    <button type="submit" class="btn btn-login btn-primary w-100 text-white">Login →</button>
  </form>
</div>
</body>
</html>
